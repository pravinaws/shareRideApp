<ion-content [fullscreen]="true" [forceOverscroll]="false">
  <ion-refresher slot="fixed" (ionRefresh)="refreshCurrentScreen($event)">
    <ion-refresher-content pullingText="Pull to refresh" refreshingText="Refreshing..."></ion-refresher-content>
  </ion-refresher>
  <div class="intro-splash" *ngIf="showIntroSplash" aria-label="shareMILES loading">
    <img src="assets/ride-share-logo.svg" alt="RideShare" />
  </div>
  <div class="loading-overlay" *ngIf="appLoading || profileLoading || vehicleSaving || chatLoading || walletProcessing" aria-label="Loading">
    <span class="loading-icon"></span>
  </div>

  <main>
    <ng-container [ngSwitch]="currentRoute">
      <app-auth-screen *ngSwitchCase="'/login'" [vm]="viewModel"></app-auth-screen>
      <app-auth-screen *ngSwitchCase="'/admin/login'" [vm]="viewModel"></app-auth-screen>

      <app-search-flow-screen *ngSwitchCase="'/search'" [vm]="viewModel"></app-search-flow-screen>
      <app-search-flow-screen *ngSwitchCase="'/results'" [vm]="viewModel"></app-search-flow-screen>
      <app-search-flow-screen *ngSwitchCase="'/ride-details'" [vm]="viewModel"></app-search-flow-screen>

      <app-publish-flow-screen *ngSwitchCase="'/publish'" [vm]="viewModel"></app-publish-flow-screen>
      <app-publish-flow-screen *ngSwitchCase="'/publish/preferences'" [vm]="viewModel"></app-publish-flow-screen>
      <app-publish-flow-screen *ngSwitchCase="'/publish/confirm'" [vm]="viewModel"></app-publish-flow-screen>

      <app-rides-flow-screen *ngSwitchCase="'/your-rides'" [vm]="viewModel"></app-rides-flow-screen>
      <app-inbox-flow-screen *ngSwitchCase="'/chat'" [vm]="viewModel"></app-inbox-flow-screen>
      <app-inbox-flow-screen *ngSwitchCase="'/inbox'" [vm]="viewModel"></app-inbox-flow-screen>

      <app-profile-flow-screen *ngSwitchCase="'/profile'" [vm]="viewModel"></app-profile-flow-screen>
      <app-profile-flow-screen *ngSwitchCase="'/kyc'" [vm]="viewModel"></app-profile-flow-screen>
      <app-profile-flow-screen *ngSwitchCase="'/profile-dynamic-disabled'" [vm]="viewModel"></app-profile-flow-screen>
      <app-profile-flow-screen *ngSwitchCase="'/vehicles'" [vm]="viewModel"></app-profile-flow-screen>

      <app-admin-screen *ngSwitchCase="'/admin'" [vm]="viewModel"></app-admin-screen>

      <app-account-flow-screen *ngSwitchCase="'/settings'" [vm]="viewModel"></app-account-flow-screen>
      <app-account-flow-screen *ngSwitchCase="'/referral'" [vm]="viewModel"></app-account-flow-screen>
      <app-payments-screen *ngSwitchCase="'/payments'" [vm]="viewModel"></app-payments-screen>
      <app-notifications-screen *ngSwitchCase="'/notifications'" [vm]="viewModel"></app-notifications-screen>
    </ng-container>

    <app-overlays [vm]="viewModel"></app-overlays>
  </main>
</ion-content>

<app-shell-footer [vm]="viewModel"></app-shell-footer>
